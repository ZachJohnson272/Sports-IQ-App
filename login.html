<style>
  :root {
    color-scheme: dark;
    --bg: #0a0a12;
    --surface: #13101e;
    --surface2: #1c1730;
    --text: #f0edf8;
    --muted: #9b8ec4;
    --purple: #6B3FA0;
    --sky: #5BB8D4;
    --radius: 16px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px 20px;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 50% at 20% -10%, rgba(107,63,160,0.55) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 110%, rgba(91,184,212,0.12) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  /* Loading overlay */
  #loadingOverlay {
    display: flex;
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 999;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
  }
  #loadingOverlay .big-spinner {
    width: 44px; height: 44px;
    border: 3px solid rgba(107,63,160,0.25);
    border-top-color: var(--sky);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  #loadingOverlay p {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px;
    letter-spacing: 3px;
    color: var(--muted);
  }

  /* Main content — hidden until session check done */
  #mainContent {
    display: none;
    width: 100%;
    justify-content: center;
  }

  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 380px;
    display: flex;
    flex-direction: column;
    align-items: center;
    animation: fadeUp 0.6s ease both;
  }

  .brand {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 32px;
  }

  .brand-icon {
    width: 72px; height: 72px;
    background: linear-gradient(135deg, #6B3FA0, #5BB8D4);
    border-radius: 22px;
    display: flex; align-items: center; justify-content: center;
    font-size: 36px;
    margin-bottom: 14px;
    box-shadow: 0 8px 32px rgba(107,63,160,0.5);
  }

  .brand-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 44px;
    letter-spacing: 5px;
    color: #fff;
    line-height: 1;
  }

  .brand-sub {
    font-size: 13px;
    color: var(--muted);
    margin-top: 6px;
    letter-spacing: 1px;
    font-style: italic;
  }

  .card {
    width: 100%;
    background: var(--surface);
    border: 1px solid rgba(107,63,160,0.35);
    border-radius: var(--radius);
    padding: 28px 24px 24px;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--purple), var(--sky), var(--purple));
  }

  .tabs {
    display: flex;
    gap: 6px;
    margin-bottom: 24px;
    background: var(--surface2);
    border-radius: 12px;
    padding: 4px;
  }

  .tab-btn {
    flex: 1;
    padding: 10px;
    background: none;
    border: none;
    border-radius: 9px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px;
    letter-spacing: 2px;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
  }

  .tab-btn.active {
    background: var(--purple);
    color: #fff;
    box-shadow: 0 2px 12px rgba(107,63,160,0.4);
  }

  .form-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 14px;
  }

  .form-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--muted);
    font-weight: 500;
  }

  .form-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid rgba(107,63,160,0.3);
    border-radius: 12px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    padding: 13px 16px;
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
  }

  .form-input:focus {
    border-color: var(--sky);
    box-shadow: 0 0 0 3px rgba(91,184,212,0.12);
  }

  .form-input::placeholder { color: var(--muted); }

  .btn-primary {
    width: 100%;
    padding: 15px;
    background: linear-gradient(135deg, var(--purple), #8B5CC8);
    color: #fff;
    border: none;
    border-radius: 12px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 3px;
    cursor: pointer;
    transition: all 0.18s;
    box-shadow: 0 4px 20px rgba(107,63,160,0.4);
    margin-top: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .btn-primary:hover   { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(107,63,160,0.6); }
  .btn-primary:active  { transform: translateY(0); }
  .btn-primary:disabled { opacity: 0.55; cursor: not-allowed; transform: none; }

  .msg {
    display: none;
    margin-top: 14px;
    padding: 10px 14px;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 500;
    text-align: center;
  }
  .msg.error   { display: block; background: rgba(224,85,85,0.12);  border: 1px solid rgba(224,85,85,0.35);  color: #e05555; }
  .msg.success { display: block; background: rgba(61,204,122,0.12); border: 1px solid rgba(61,204,122,0.35); color: #3dcc7a; }

  .switch-hint { text-align: center; font-size: 12px; color: var(--muted); margin-top: 18px; }
  .switch-hint span { color: var(--sky); cursor: pointer; font-weight: 600; }
  .switch-hint span:hover { text-decoration: underline; }

  .spinner {
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    flex-shrink: 0;
  }

  @keyframes spin   { to { transform: rotate(360deg); } }
  @keyframes fadeUp { from { opacity:0; transform:translateY(18px); } to { opacity:1; transform:translateY(0); } }
</style>
</head>
<body>

<!-- Shown while checking if user is already logged in -->
<div id="loadingOverlay">
  <div class="big-spinner"></div>
  <p>Loading...</p>
</div>

<!-- Hidden until session check completes -->
<div id="mainContent">
  <div class="container">

    <div class="brand">
      <div class="brand-icon">🧠</div>
      <div class="brand-title">Sports IQ</div>
      <div class="brand-sub">Test your sports knowledge</div>
    </div>

    <div class="card">

      <div class="tabs">
        <button class="tab-btn active" id="tabLogin"  onclick="switchTab('login')">Log In</button>
        <button class="tab-btn"        id="tabSignup" onclick="switchTab('signup')">Sign Up</button>
      </div>

      <div class="form-group">
        <label class="form-label" for="emailInput">Email</label>
        <input class="form-input" id="emailInput" type="email"
               placeholder="you@example.com" autocomplete="email" />
      </div>

      <div class="form-group">
        <label class="form-label" for="passwordInput">Password</label>
        <input class="form-input" id="passwordInput" type="password"
               placeholder="••••••••" autocomplete="current-password" />
      </div>

      <button class="btn-primary" id="actionBtn" onclick="handleAction()">Log In</button>

      <div class="msg" id="msgBox"></div>

      <div class="switch-hint" id="switchHint">
        Don't have an account? <span onclick="switchTab('signup')">Sign Up</span>
      </div>

    </div>
    <!-- /.card -->

  </div>
  <!-- /.container -->
</div>
<!-- /#mainContent -->

<script>
// ============================================================
//  SESSION CHECK — runs immediately on page load
// ============================================================
function showForm() {
  console.log('[SportsIQ] Showing login form.');
  document.getElementById('loadingOverlay').style.display = 'none';
  document.getElementById('mainContent').style.display    = 'flex';
}

(async () => {
  console.log('[SportsIQ] Checking session...');

  // Failsafe: always show form after 5s no matter what
  const fallback = setTimeout(() => {
    console.warn('[SportsIQ] Timeout — showing form anyway.');
    showForm();
  }, 5000);

  try {
    const { data, error } = await sb.auth.getSession();
    clearTimeout(fallback);

    if (error) {
      console.error('[SportsIQ] Session error:', error.message);
      showForm();
      return;
    }

    if (data.session) {
      console.log('[SportsIQ] Already logged in — going to index.html');
      window.location.href = 'index.html';
    } else {
      console.log('[SportsIQ] Not logged in — showing form.');
      showForm();
    }

  } catch (err) {
    clearTimeout(fallback);
    console.error('[SportsIQ] Unexpected error:', err);
    showForm();
  }
})();


// ============================================================
//  LOGIN
// ============================================================
async function login() {
  const email    = document.getElementById('emailInput').value.trim();
  const password = document.getElementById('passwordInput').value;

  if (!email || !password) { showMsg('Please enter your email and password.', 'error'); return; }

  setLoading(true);
  clearMsg();

  const { error } = await sb.auth.signInWithPassword({ email, password });

  if (error) {
    console.error('[SportsIQ] Login error:', error.message);
    showMsg(error.message, 'error');
    setLoading(false);
  } else {
    console.log('[SportsIQ] Login successful!');
    showMsg('Welcome back! Redirecting…', 'success');
    setTimeout(() => { window.location.href = 'index.html'; }, 700);
  }
}


// ============================================================
//  SIGN UP
// ============================================================
async function signup() {
  const email    = document.getElementById('emailInput').value.trim();
  const password = document.getElementById('passwordInput').value;

  if (!email || !password) { showMsg('Please enter your email and password.', 'error'); return; }
  if (password.length < 6)  { showMsg('Password must be at least 6 characters.', 'error'); return; }

  setLoading(true);
  clearMsg();

  const { error } = await sb.auth.signUp({ email, password });

  if (error) {
    console.error('[SportsIQ] Signup error:', error.message);
    showMsg(error.message, 'error');
    setLoading(false);
  } else {
    console.log('[SportsIQ] Signup successful!');
    setLoading(false);
    showMsg('Account created! Check your email to confirm, then log in.', 'success');
    switchTab('login');
  }
}


// ============================================================
//  LOGOUT — copy this into index.html's <script> block
//
//  async function logout() {
//    await sb.auth.signOut();
//    window.location.href = 'login.html';
//  }
// ============================================================


// ---- Tab switching ----
let currentTab = 'login';

function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tabLogin').classList.toggle('active',  tab === 'login');
  document.getElementById('tabSignup').classList.toggle('active', tab === 'signup');
  document.getElementById('actionBtn').textContent = tab === 'login' ? 'Log In' : 'Sign Up';
  document.getElementById('switchHint').innerHTML  = tab === 'login'
    ? 'Don\'t have an account? <span onclick="switchTab(\'signup\')">Sign Up</span>'
    : 'Already have an account? <span onclick="switchTab(\'login\')">Log In</span>';
  document.getElementById('passwordInput').autocomplete = tab === 'login' ? 'current-password' : 'new-password';
  clearMsg();
}

function handleAction() {
  if (currentTab === 'login') login(); else signup();
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') handleAction(); });

// ---- UI helpers ----
function showMsg(text, type) {
  const box = document.getElementById('msgBox');
  box.textContent = text;
  box.className = 'msg ' + type;
}

function clearMsg() {
  document.getElementById('msgBox').textContent = '';
  document.getElementById('msgBox').className = 'msg';
}

function setLoading(on) {
  const btn = document.getElementById('actionBtn');
  btn.disabled = on;
  btn.innerHTML = on
    ? '<div class="spinner"></div>' + (currentTab === 'login' ? 'Logging In…' : 'Creating Account…')
    : (currentTab === 'login' ? 'Log In' : 'Sign Up');
}
</script>
</body>
</html>
